<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RutaApp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --navy:#0d1b2a;--blue:#1e56d0;--blue-lt:#eef2ff;
  --green:#059669;--red:#dc2626;--amber:#d97706;
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;--muted2:#94a3b8;
  --radius:10px;--safe-bottom:env(safe-area-inset-bottom,0px);
  --emp-primary:#1e56d0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

#login-screen{position:fixed;inset:0;z-index:999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-logo{height:80px;margin-bottom:28px;display:block;margin-left:auto;margin-right:auto;max-width:220px;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
.login-box{width:100%;max-width:340px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px}
.login-title{font-size:17px;font-weight:700;color:#fff;text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:#64748b;text-align:center;margin-bottom:20px}
.l-label{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.l-input{width:100%;padding:12px 14px;border:1.5px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-family:"Inter",sans-serif;outline:none;transition:border-color .2s;margin-bottom:12px;-webkit-appearance:none}
.l-input:focus{border-color:var(--emp-primary)}
.l-input::placeholder{color:#334155}
.l-btn{width:100%;padding:13px;border:none;border-radius:8px;background:var(--emp-primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:"Inter",sans-serif;transition:filter .15s;margin-top:4px}
.l-btn:active{filter:brightness(.9)}
.l-err{font-size:12px;color:#fca5a5;text-align:center;margin-top:10px;min-height:18px}
.l-debug{display:none;margin-top:12px;padding:10px;background:rgba(0,0,0,.3);border-radius:7px;font-size:11px;font-family:monospace;color:#94a3b8;white-space:pre-wrap;text-align:left;max-height:220px;overflow-y:auto;line-height:1.6}

#app{display:none}
#app.on{display:block}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;opacity:0;pointer-events:none;transition:opacity .2s}
#overlay.open{opacity:1;pointer-events:all}

#sidebar{position:fixed;top:0;left:0;height:100%;width:280px;background:var(--navy);z-index:300;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#sidebar.open{transform:translateX(0)}
.sb-head{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
.sb-logo{height:36px;object-fit:contain;max-width:140px}
.sb-emp-name{font-size:13px;font-weight:700;color:#e2e8f0;flex:1}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:14px;padding:13px 18px;border:none;background:none;width:100%;text-align:left;color:#94a3b8;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:"Inter",sans-serif}
.sb-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sb-item:hover{background:rgba(255,255,255,.05);color:#e2e8f0}
.sb-item.active{background:rgba(30,86,208,.2);color:#93c5fd;border-right:2px solid var(--emp-primary)}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between}
.sb-user{font-size:12px;color:#475569}
.sb-user span{color:#94a3b8;font-weight:600;display:block}
.sb-logout{background:none;border:none;cursor:pointer;font-size:12px;color:#475569;font-family:"Inter",sans-serif;padding:5px 9px;border-radius:5px;transition:color .15s}
.sb-logout:hover{color:#fca5a5}

.app-header{background:var(--navy);height:54px;display:flex;align-items:center;gap:12px;padding:0 14px;position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.hbtn{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;border-radius:6px}
.hbtn span{display:block;width:20px;height:2px;background:#94a3b8;border-radius:2px}
.htitle{flex:1;font-size:15px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#sync-msg{font-size:11px;font-weight:600;white-space:nowrap;color:#64748b}
#sync-msg.ok{color:#34d399}
#sync-msg.err{color:#fbbf24}

.main{padding:12px 12px calc(24px + var(--safe-bottom));max-width:520px;margin:0 auto}
.section{display:none}
.section.active{display:block}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.card-head{padding:13px 15px 0}
.card-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.card-body{padding:11px 15px 15px}
.row{display:flex;gap:8px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:15px;font-family:"Inter",sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--emp-primary)}
input[type=number]{font-variant-numeric:tabular-nums}
textarea{resize:none;font-size:14px;line-height:1.5}
.lista-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:var(--blue-lt);color:var(--blue);font-size:11px;font-weight:600;margin-top:6px}
.search-wrap{position:relative}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:999;display:none;max-height:240px;overflow-y:auto}
.dropdown.open{display:block}
.dd-item{display:flex;justify-content:space-between;align-items:center;padding:12px 13px;border-bottom:1px solid var(--border);cursor:pointer;gap:8px}
.dd-item:last-child{border-bottom:none}
.dd-item:active{background:var(--blue-lt)}
.dd-item *{pointer-events:none}
.dd-name{font-size:14px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dd-code{font-size:10px;font-weight:700;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:4px;white-space:nowrap}
.dd-price{font-size:14px;font-weight:700;color:var(--emp-primary);white-space:nowrap;font-variant-numeric:tabular-nums}
.item-row{display:flex;align-items:center;gap:8px;padding:10px 15px;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-cant{font-size:13px;font-weight:700;color:var(--muted);min-width:26px;text-align:center}
.item-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-sub{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.item-del{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:18px;line-height:1;padding:2px 4px;flex-shrink:0;border-radius:4px}
.item-del:active{color:var(--red);background:#fee2e2}
.items-empty{padding:18px 15px;text-align:center;color:var(--muted2);font-size:13px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:var(--bg);border-top:1px solid var(--border)}
.total-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.total-val{font-size:20px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px;border:none;border-radius:8px;font-family:"Inter",sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:filter .15s,transform .1s;width:100%}
.btn:active{transform:scale(.98);filter:brightness(.9)}
.btn-primary{background:var(--emp-primary);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-sm{padding:9px 14px;font-size:13px;width:auto;border-radius:7px}
.btn-icon{padding:9px;width:auto;border-radius:7px}
.add-row{display:flex;gap:8px;align-items:stretch}
.add-row input[type=number]{width:70px;flex-shrink:0;text-align:center;font-weight:600}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.empty-box{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:8px}
.fb-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.fb-pill.ok{background:#d1fae5;color:#065f46}
.fb-pill.warn{background:#fef3c7;color:#92400e}
.fb-pill.err{background:#fee2e2;color:#991b1b}
.fb-pill.sync{background:var(--bg);color:var(--muted)}

/* RUTAS */
.ruta-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ruta-list-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:"Inter",sans-serif;transition:background .15s;margin-bottom:6px;text-align:left}
.ruta-list-btn.open{border-color:var(--emp-primary);background:var(--blue-lt)}
.ruta-fecha{font-size:13px;font-weight:700;color:var(--text)}
.ruta-resumen{font-size:11px;color:var(--muted);margin-top:2px}
.ruta-chips{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:10px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.chip-ok{background:#d1fae5;color:#065f46}
.chip-warn{background:#fef3c7;color:#92400e}
.chip-red{background:#fee2e2;color:#991b1b}
.ruta-detail{display:none;margin-bottom:10px}
.ruta-detail.open{display:block}
.ruta-detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ruta-action-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ruta-action-btns button{flex:1;min-width:80px;padding:9px 8px;border-radius:7px;font-family:"Inter",sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s}
.ruta-action-btns button:active{filter:brightness(.9)}
.ruta-action-btns .btn-pdf{background:var(--emp-primary);color:#fff;border-color:var(--emp-primary)}
.ruta-action-btns .btn-rename{color:var(--emp-primary);border-color:var(--emp-primary)}
.ruta-action-btns .btn-del-ruta{color:var(--red);border-color:#fca5a5}
.ruta-cli-row{border-bottom:1px solid var(--border)}
.ruta-cli-row:last-child{border-bottom:none}
.ruta-cli-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .12s}
.ruta-cli-head:active{background:var(--bg)}
.ruta-cli-nom{flex:1;font-size:14px;font-weight:600}
.ruta-cli-body{padding:0 14px 14px;display:none}
.ruta-cli-body.open{display:block}
.pago-section{background:var(--bg);border-radius:8px;padding:12px;margin-top:8px}
.pago-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.pago-modo-row{display:flex;gap:6px;margin-bottom:10px}
.modo-btn{flex:1;padding:9px 6px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);font-family:"Inter",sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.modo-btn.sel{border-color:var(--emp-primary);background:var(--blue-lt);color:var(--emp-primary)}
.pago-inputs{display:flex;gap:8px}
.pago-field{flex:1}
.pago-field label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block}
.pago-field input{padding:9px 11px;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right}
.pago-saldo-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.pago-saldo-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.pago-saldo-val{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.pago-saldo-val.ok{color:var(--green)}.pago-saldo-val.warn{color:var(--amber)}.pago-saldo-val.neg{color:var(--red)}
.save-pago-btn{padding:9px;background:var(--emp-primary);color:#fff;border:none;border-radius:7px;font-family:"Inter",sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.cli-action-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.cli-action-row button{flex:1;padding:8px 6px;border-radius:7px;font-family:"Inter",sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.cli-action-row button:active{filter:brightness(.9)}
.btn-mover{background:#eef2ff;color:var(--emp-primary);border:1.5px solid var(--emp-primary)}
.btn-quitar{background:#fee2e2;color:var(--red);border:1.5px solid #fca5a5}
.ruta-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.ruta-item:last-child{border-bottom:none}
.ruta-item-name{font-size:13px;flex:1}
.ruta-item-cant{font-size:12px;color:var(--muted);margin:0 8px;white-space:nowrap}
.ruta-item-sub{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.ruta-total-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--navy);border-radius:0 0 var(--radius) var(--radius)}
.ruta-total-lbl{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px}
.ruta-total-val{font-size:16px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.ruta-summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.rsb-item{background:var(--surface);padding:10px;text-align:center}
.rsb-val{font-size:16px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
.rsb-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.nueva-ruta-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-family:"Inter",sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}

/* RESUMEN */
.res-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.res-toolbar select{flex:1;min-width:100px;font-size:14px;padding:9px 12px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.kpi.full{grid-column:1/-1}
.kpi-icon{font-size:22px;margin-bottom:4px}
.kpi-val{font-size:20px;font-weight:700;color:var(--navy);line-height:1.1;font-variant-numeric:tabular-nums}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.kpi-sub{font-size:12px;color:var(--emp-primary);font-weight:600;margin-top:2px}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.sec-head{padding:11px 14px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg)}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-n{font-size:10px;font-weight:700;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--muted2)}
.rank-n.g{background:#f59e0b}.rank-n.s{background:#94a3b8}.rank-n.b{background:#b45309}
.rank-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-val{font-size:13px;font-weight:700;color:var(--emp-primary);font-variant-numeric:tabular-nums;white-space:nowrap}
.rank-bar-bg{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:3px}
.rank-bar{height:3px;background:var(--emp-primary);border-radius:2px}
.detail-row{display:flex;align-items:center;padding:10px 14px;gap:8px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-date{font-size:12px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
.detail-cli{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-tot{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:16px;padding:2px 4px;border-radius:4px;flex-shrink:0}
.del-btn:active{color:var(--red);background:#fee2e2}
.empty-res{text-align:center;padding:36px 20px;color:var(--muted)}
.cfg-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:14px 0 5px;display:block}
.danger-zone{margin-top:20px;padding-top:16px;border-top:1px dashed #fca5a5}
.danger-lbl{font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* MODALES */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:#1a2436;border:1px solid #2a3a52;border-radius:14px;width:100%;max-width:340px;overflow:hidden}
.modal-head{padding:16px 18px;border-bottom:1px solid #2a3a52;display:flex;align-items:center;justify-content:space-between}
.modal-ttl{font-size:15px;font-weight:700;color:#f1f5f9}
.modal-cls{background:none;border:none;color:#64748b;font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px}
.modal-body{padding:18px}
.modal-foot{padding:12px 18px;border-top:1px solid #2a3a52;display:flex;gap:8px;justify-content:flex-end}
.modal-input{width:100%;padding:11px 13px;border:1.5px solid #2a3a52;border-radius:8px;background:#0d1b2a;color:#f1f5f9;font-size:15px;font-family:"Inter",sans-serif;outline:none;margin-bottom:4px;-webkit-appearance:none}
.modal-input:focus{border-color:#1e56d0}
.modal-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:block}
.mbtn{padding:9px 16px;border:none;border-radius:7px;font-family:"Inter",sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:filter .15s}
.mbtn:active{filter:brightness(.9)}
.mbtn-primary{background:#1e56d0;color:#fff}
.mbtn-ghost{background:#1a2436;color:#94a3b8;border:1px solid #2a3a52}

.dropdown::-webkit-scrollbar{width:3px}
.dropdown::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
</style>
</head>

<script>
var FB = "https://distrimar-5e1a3-default-rtdb.firebaseio.com";
var MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var TITLES = {pedido:"Nuevo Pedido",remito:"Nuevo Remito",hoja:"Hoja de Ruta",resumen:"Resumen Mensual"};
var MED = ["g","s","b"];

var empresaKey = "", empresaData = {}, currentUser = null;
var dbStock = [], dbCli = [], ventas = [], rutasData = {};
var rutaAbierta = null, clienteAbierto = {};
var modalRutaKey = null, modalCliKey = null;
var ordenes = {ped:[],rem:[]};
var tipoLista = {ped:"Clientes",rem:"Clientes"};
var itemSel = {ped:null,rem:null};

function fbGet(p){ return fetch(FB+"/"+p+".json").then(function(r){return r.json();}); }
function fbPush(p,d){ return fetch(FB+"/"+p+".json",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(function(r){return r.json();}).then(function(j){return j.name;}); }
function fbPatch(p,d){ return fetch(FB+"/"+p+".json",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}); }
function fbDel(p){ return fetch(FB+"/"+p+".json",{method:"DELETE"}); }
function fM(n){ return Number(n).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function parseLocalFloat(v){ if(!v)return 0; var s=v.toString().trim().replace(/"/g,""); if(s.includes(",")&&s.includes("."))s=s.replace(/\./g,"").replace(",","."); else if(s.includes(","))s=s.replace(",","."); return parseFloat(s)||0; }
function splitCSV(row,sep){ var res=[],w="",q=false; for(var i=0;i<row.length;i++){var c=row[i];if(c==='"')q=!q;else if(c===sep&&!q){res.push(w);w="";}else w+=c;} res.push(w); return res.map(function(v){return v.trim().replace(/"/g,"");}); }
function setStatus(id,cls,txt){ var el=document.getElementById(id); if(el){el.className="fb-pill "+cls;el.textContent=txt;} }
function limpiarFormulario(t){ ["idCli","nomCli","bus","obs"].forEach(function(f){var el=document.getElementById(f+"-"+t);if(el)el.value="";}); document.getElementById("badge-"+t).textContent="📋 Clientes"; document.getElementById("cant-"+t).value="1"; document.getElementById("res-"+t).classList.remove("open"); tipoLista[t]="Clientes"; itemSel[t]=null; ordenes[t]=[]; renderItems(t); }
function cerrarModal(id){ document.getElementById(id).classList.remove("open"); }
function abrirModal(id){ document.getElementById(id).classList.add("open"); }

window.onload = function(){
  var saved = sessionStorage.getItem("dm_session");
  if(saved){ try{ var s=JSON.parse(saved); empresaKey=s.empresaKey; currentUser=s.user; empresaData=s.empresaData; aplicarBranding(); iniciarApp(); }catch(e){ sessionStorage.removeItem("dm_session"); } }
  document.getElementById("l-pass").addEventListener("keydown",function(e){ if(e.key==="Enter")doLogin(); });
};

function doLogin(){
  var empCod=document.getElementById("l-empresa").value.trim().toLowerCase();
  var uid=document.getElementById("l-user").value.trim();
  var pass=document.getElementById("l-pass").value;
  var err=document.getElementById("l-err");
  var dbg=document.getElementById("l-debug");
  err.textContent=""; dbg.style.display="none"; dbg.textContent="";
  if(!empCod||!uid||!pass){err.textContent="Completá todos los campos";return;}
  err.textContent="🔄 Conectando…";
  var log="";
  function addLog(txt){log+=txt+"\n";dbg.textContent=log;dbg.style.display="block";}
  fetch(FB+"/empresas.json").then(function(resp){
    addLog("HTTP: "+resp.status);
    if(resp.status===401||resp.status===403){err.textContent="🔒 Firebase bloqueado — revisá las reglas";throw new Error("blocked");}
    return resp.json();
  }).then(function(empresas){
    if(!empresas){err.textContent="⚠️ Base vacía — creá una empresa en el admin";addLog("Base vacía");return;}
    addLog("Empresas: "+Object.keys(empresas).length);
    Object.entries(empresas).forEach(function(e){addLog("  codigo='"+( e[1].codigo||"?")+"' usuarios="+Object.keys(e[1].usuarios||{}).length);});
    var key=null;
    Object.keys(empresas).forEach(function(k){var e=empresas[k];if(e&&e.codigo&&e.codigo.toString().toLowerCase().trim()===empCod)key=k;});
    if(!key){err.textContent="❌ Empresa '"+empCod+"' no encontrada";addLog("Códigos: "+Object.values(empresas).map(function(e){return e.codigo||"?";}).join(", "));return;}
    var emp=empresas[key];
    if(emp.estado==="inactiva"){err.textContent="⏸ Cuenta suspendida";return;}
    var users=emp.usuarios||{};
    addLog("Usuarios: "+Object.keys(users).join(", "));
    var foundUser=null;
    if(users[uid]&&users[uid].pass===pass){foundUser=users[uid];}
    else{Object.keys(users).forEach(function(k){if(users[k].id===uid&&users[k].pass===pass)foundUser=users[k];});}
    if(!foundUser){err.textContent="❌ Usuario o contraseña incorrectos";addLog("Usuario '"+uid+"' no encontrado o contraseña incorrecta");return;}
    empresaKey=key; empresaData=emp; currentUser=foundUser;
    sessionStorage.setItem("dm_session",JSON.stringify({empresaKey:key,user:currentUser,empresaData:emp}));
    document.getElementById("l-pass").value="";
    err.textContent=""; dbg.style.display="none";
    aplicarBranding(); iniciarApp();
  }).catch(function(e){if(e.message!=="blocked"){err.textContent="❌ Error: "+e.message;addLog("Error: "+e.message);}});
}

function cargarCatalogo(){
  var msg=document.getElementById("sync-msg"); msg.className=""; msg.textContent="\u{1F504}";
  fbGet("empresas/"+empresaKey).then(function(emp){
    if(!emp)return;
    empresaData=Object.assign({},empresaData,emp);
    var productos=emp.productos||null;
    if(productos&&Object.keys(productos).length>0){
      dbStock=Object.values(productos).filter(function(p){return p.nombre;}).map(function(p){
        return{id:p.codigo||p.nombre.substring(0,4),n:p.nombre,pCli:p.precioClientes||0,pPat:p.precioPatagonia||0};
      });
    } else {
      var rawS=emp.stockCSV||"";
      var lS=rawS.split("\n").filter(function(l){return l.trim();});
      if(lS.length>1){var sep=lS[0].indexOf(";")>=0?";":",";}
      else var sep=",";
      if(lS.length>1){dbStock=lS.slice(1).map(function(l){var r=splitCSV(l,sep);return{id:r[0],n:r[1],pCli:parseLocalFloat(r[2]),pPat:parseLocalFloat(r[3])||parseLocalFloat(r[2])};}).filter(function(p){return p.id;});}
    }
    var rawC=emp.clientesCSV||"";
    var lC=rawC.split("\n").filter(function(l){return l.trim();});
    if(lC.length>1){var sep2=lC[0].indexOf(";")>=0?";":",";}
    else var sep2=",";
    if(lC.length>1){dbCli=lC.slice(1).map(function(l){var r=splitCSV(l,sep2);return{id:r[0],nombre:r[1],lista:r[2]||"Clientes"};}).filter(function(c){return c.id;});}
    actualizarDL(); msg.className="ok"; msg.textContent="\u2705";
  }).catch(function(){msg.className="err";msg.textContent="\u26A0\uFE0F";});
}
function actualizarDL(){ var h=dbCli.map(function(c){return '<option value="'+c.nombre+'">';}).join(""); document.getElementById("dl-cli-ped").innerHTML=h; document.getElementById("dl-cli-rem").innerHTML=h; }
function vincularCli(origen,t){ var idIn=document.getElementById("idCli-"+t),nomIn=document.getElementById("nomCli-"+t); var c=origen==="id"?dbCli.find(function(x){return x.id.toString()===idIn.value.trim();}):dbCli.find(function(x){return x.nombre.trim()===nomIn.value.trim();}); if(c){idIn.value=c.id;nomIn.value=c.nombre;tipoLista[t]=c.lista.toLowerCase().includes("patagonia")?"Patagonia":"Clientes";document.getElementById("badge-"+t).textContent="📋 "+tipoLista[t];} }
function filtrar(t){ var box=document.getElementById("res-"+t),bus=document.getElementById("bus-"+t).value.toLowerCase().trim(); box.innerHTML=""; if(bus.length<1){box.classList.remove("open");return;} var res=dbStock.filter(function(p){return p.id.toLowerCase().includes(bus)||p.n.toLowerCase().includes(bus);}).slice(0,12); if(res.length){box.classList.add("open");res.forEach(function(p){var pre=tipoLista[t]==="Patagonia"?p.pPat:p.pCli;var div=document.createElement("div");div.className="dd-item";div.innerHTML='<span class="dd-code">'+p.id+'</span><span class="dd-name">'+p.n+'</span><span class="dd-price">$'+fM(pre)+'</span>';div.onclick=function(){itemSel[t]=Object.assign({},p,{pre:pre});document.getElementById("bus-"+t).value=p.n;box.classList.remove("open");};box.appendChild(div);});}else box.classList.remove("open"); }
function agregar(t){ var cant=parseFloat(document.getElementById("cant-"+t).value)||1; if(!itemSel[t])return; var exist=ordenes[t].find(function(x){return x.id===itemSel[t].id&&x.p===itemSel[t].pre;}); if(exist){exist.c+=cant;exist.sub=exist.p*exist.c;}else ordenes[t].push({id:itemSel[t].id,n:itemSel[t].n,p:itemSel[t].pre,c:cant,sub:itemSel[t].pre*cant}); renderItems(t); document.getElementById("bus-"+t).value=""; document.getElementById("cant-"+t).value="1"; itemSel[t]=null; }
function renderItems(t){ var wrap=document.getElementById("items-"+t); document.getElementById("total-"+t).textContent=fM(ordenes[t].reduce(function(s,i){return s+i.sub;},0)); if(!ordenes[t].length){wrap.innerHTML='<div class="items-empty">Sin productos aún</div>';return;} 
  var html2="";
  ordenes[t].forEach(function(it,i){
    html2+='<div class="item-row"><span class="item-cant">'+it.c+'×</span><span class="item-name">'+it.n+'</span><span class="item-sub">$'+fM(it.sub)+'</span><button class="item-del" data-t="'+t+'" data-i="'+i+'" onclick="quitarItem(this.dataset.t,+this.dataset.i)">✕</button></div>';
  });
  wrap.innerHTML=html2;
}
function quitarItem(t,i){ ordenes[t].splice(i,1); renderItems(t); }

function generarPDF(m){
  var t=m==="pedido"?"ped":"rem";
  if(!ordenes[t].length){alert("Agregá al menos un producto.");return;}
  var jsPDF=window.jspdf.jsPDF, doc=new jsPDF();
  var nom=document.getElementById("nomCli-"+t).value||"Mostrador";
  var tot=document.getElementById("total-"+t).textContent;
  var obs=document.getElementById("obs-"+t).value.trim();
  if(empresaData.logo)doc.addImage(empresaData.logo,"PNG",10,5,40,20);
  doc.setFontSize(18);doc.setFont("helvetica","bold");
  doc.text((empresaData.nombre||"EMPRESA")+" - "+m.toUpperCase(),105,16,{align:"center"});
  doc.setFontSize(11);doc.setFont("helvetica","normal");
  doc.text("Cliente: "+nom,55,25);doc.text("Lista: "+tipoLista[t],55,31);
  doc.text("Fecha: "+new Date().toLocaleDateString()+" "+new Date().toLocaleTimeString(),55,37);
  doc.autoTable({startY:44,head:[["Cant","Cod","Producto","P.U","Sub"]],body:ordenes[t].map(function(i){return[i.c,i.id,i.n,"$"+fM(i.p),"$"+fM(i.sub)];}),foot:[["","","","TOTAL","$"+tot]],theme:"striped",headStyles:{fillColor:[13,27,42]}});
  if(obs){var y=doc.lastAutoTable.finalY+10;doc.setFont("helvetica","bold");doc.text("OBSERVACIONES:",14,y);doc.setFont("helvetica","normal");doc.text(doc.splitTextToSize(obs,180),14,y+7);}
  if(m==="remito"){
    var totalNum=parseLocalFloat(tot), ahora=new Date();
    var venta={fecha:ahora.toISOString(),mes:ahora.getMonth(),anio:ahora.getFullYear(),clienteId:document.getElementById("idCli-rem").value,clienteNom:nom,lista:tipoLista[t],items:ordenes[t].map(function(i){return{id:i.id,n:i.n,c:i.c,p:i.p,sub:i.sub};}),total:totalNum,usuario:currentUser.id};
    var itemsCopy=ordenes[t].map(function(i){return{id:i.id,n:i.n,c:i.c,p:i.p,sub:i.sub};});
    var cliIdVal=document.getElementById("idCli-rem").value;
    fbPush("empresas/"+empresaKey+"/ventas",venta).then(function(){
      var hoy=new Date().toLocaleDateString("es-AR");
      var keys=Object.keys(rutasData);
      var rutaHoy=keys.find(function(k){return rutasData[k].fecha&&new Date(rutasData[k].fecha).toLocaleDateString("es-AR")===hoy;});
      var rkPromise;
      if(rutaAbierta)rkPromise=Promise.resolve(rutaAbierta);
      else if(rutaHoy)rkPromise=Promise.resolve(rutaHoy);
      else{var nn="Ruta "+new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});var nv={nombre:nn,fecha:ahora.toISOString(),clientes:{}};rkPromise=fbPush("empresas/"+empresaKey+"/rutas",nv).then(function(k){rutasData[k]=nv;rutaAbierta=k;return k;});}
      return rkPromise.then(function(rk){
        var cd={nom:nom,id:cliIdVal,importe:totalNum,efectivo:0,transferencia:0,modo:"ninguno",items:itemsCopy,fecha:ahora.toISOString()};
        return fbPush("empresas/"+empresaKey+"/rutas/"+rk+"/clientes",cd).then(function(ck){if(!rutasData[rk])rutasData[rk]={clientes:{}};if(!rutasData[rk].clientes)rutasData[rk].clientes={};rutasData[rk].clientes[ck]=cd;});
      });
    }).catch(function(e){console.warn("Firebase:",e);});
  }
  var blob=doc.output("blob"), file=new File([blob],m+"_"+nom+".pdf",{type:"application/pdf"});
  if(navigator.share)navigator.share({files:[file]}).catch(function(){doc.save(m+"_"+nom+".pdf");});
  else doc.save(m+"_"+nom+".pdf");
  limpiarFormulario(t);
}

// ══ RUTAS ══
function cargarRutasFirebase(){ setStatus("fb-hoja-status","sync","☁️ Cargando…"); fbGet("empresas/"+empresaKey+"/rutas").then(function(d){rutasData=d||{};setStatus("fb-hoja-status","ok","✅");renderRutas();}).catch(function(){setStatus("fb-hoja-status","err","❌");}); }
function crearNuevaRuta(){ var nombre=prompt("Nombre para esta ruta:"); if(!nombre||!nombre.trim())return; var nv={nombre:nombre.trim(),fecha:new Date().toISOString(),clientes:{}}; fbPush("empresas/"+empresaKey+"/rutas",nv).then(function(key){rutasData[key]=nv;rutaAbierta=key;renderRutas();}).catch(function(){alert("Error al crear ruta.");}); }
function borrarRuta(rk){ if(!confirm("¿Borrar esta hoja de ruta completa?"))return; fbDel("empresas/"+empresaKey+"/rutas/"+rk).then(function(){delete rutasData[rk];if(rutaAbierta===rk)rutaAbierta=null;renderRutas();}).catch(function(){alert("Error al borrar.");}); }
function calcRuta(ruta){ var cl=Object.values(ruta.clientes||{}); var tot=cl.reduce(function(s,c){return s+(c.importe||0);},0); var cob=cl.reduce(function(s,c){return s+(c.efectivo||0)+(c.transferencia||0);},0); return{total:tot,cobrado:cob,saldo:tot-cob,clientes:cl.length,pagados:cl.filter(function(c){return(c.efectivo||0)+(c.transferencia||0)>=(c.importe||0);}).length}; }

function renderRutas(){
  var wrap=document.getElementById("rutas-list");
  var keys=Object.keys(rutasData).sort(function(a,b){return(rutasData[b].fecha||"").localeCompare(rutasData[a].fecha||"");});
  if(!keys.length){document.getElementById("ruta-summary-bar").style.display="none";wrap.innerHTML='<div class="empty-box"><div class="empty-icon">🗺️</div>Sin hojas de ruta.<br><small>Creá una con el botón de arriba.</small></div>';return;}
  var gT=0,gC=0;
  keys.forEach(function(k){var c=calcRuta(rutasData[k]);gT+=c.total;gC+=c.cobrado;});
  document.getElementById("ruta-summary-bar").style.display="grid";
  document.getElementById("rsb-total").textContent="$"+fM(gT);
  document.getElementById("rsb-cobrado").textContent="$"+fM(gC);
  var gS=gT-gC;
  var rsv=document.getElementById("rsb-saldo");
  rsv.textContent="$"+fM(gS);
  rsv.style.color=gS<=0?"var(--green)":"var(--amber)";

  wrap.innerHTML="";
  keys.forEach(function(rutaKey){
    var ruta=rutasData[rutaKey];
    var calc=calcRuta(ruta);
    var isOpen=rutaAbierta===rutaKey;
    var fecha=ruta.fecha?new Date(ruta.fecha).toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"}):"—";

    var outer=document.createElement("div");

    // Toggle button
    var toggleBtn=document.createElement("button");
    toggleBtn.className="ruta-list-btn"+(isOpen?" open":"");
    toggleBtn.dataset.rk=rutaKey;
    toggleBtn.innerHTML=
      '<div style="flex:1;min-width:0"><div class="ruta-fecha">'+(ruta.nombre||fecha)+'</div><div class="ruta-resumen">'+fecha+' · '+calc.clientes+' clientes · '+calc.pagados+'/'+calc.clientes+' pagados</div></div>'+
      '<div class="ruta-chips">'+
        (calc.saldo<=0?'<span class="chip chip-ok">✓ Cobrado</span>':'<span class="chip chip-warn">$'+fM(calc.saldo)+' pend.</span>')+
        '<span style="color:var(--muted2);font-size:15px">'+(isOpen?"▲":"▼")+'</span>'+
      '</div>';
    toggleBtn.onclick=function(){ toggleRuta(rutaKey); };
    outer.appendChild(toggleBtn);

    // Detail
    var detail=document.createElement("div");
    detail.className="ruta-detail"+(isOpen?" open":"");

    var detailCard=document.createElement("div");
    detailCard.className="ruta-detail-card";

    // Clientes
    var cliKeys=Object.keys(ruta.clientes||{}).sort();
    if(!cliKeys.length){
      detailCard.innerHTML='<div class="empty-box" style="padding:16px">Sin clientes</div>';
    } else {
      cliKeys.forEach(function(ck){
        detailCard.appendChild(buildClienteRow(rutaKey,ck,ruta.clientes[ck]));
      });
    }

    // Total bar
    var totalBar=document.createElement("div");
    totalBar.className="ruta-total-bar";
    totalBar.innerHTML='<span class="ruta-total-lbl">Total ruta</span><div style="text-align:right"><div class="ruta-total-val">$'+fM(calc.total)+'</div><div style="font-size:11px;color:#94a3b8;margin-top:1px">Cobrado $'+fM(calc.cobrado)+' · Saldo $'+fM(calc.saldo)+'</div></div>';
    detailCard.appendChild(totalBar);
    detail.appendChild(detailCard);

    // Action buttons (PDF, Renombrar, Borrar)
    var actBtns=document.createElement("div");
    actBtns.className="ruta-action-btns";

    var btnPDF=document.createElement("button");
    btnPDF.className="btn-pdf"; btnPDF.textContent="📥 PDF";
    btnPDF.onclick=function(){descargarPDFRuta(rutaKey);};

    var btnRen=document.createElement("button");
    btnRen.className="btn-rename"; btnRen.textContent="✏️ Renombrar";
    btnRen.onclick=function(){abrirRenombrar(rutaKey);};

    var btnDel=document.createElement("button");
    btnDel.className="btn-del-ruta"; btnDel.textContent="🗑 Borrar ruta";
    btnDel.onclick=function(){borrarRuta(rutaKey);};

    actBtns.appendChild(btnPDF);
    actBtns.appendChild(btnRen);
    actBtns.appendChild(btnDel);
    detail.appendChild(actBtns);

    outer.appendChild(detail);
    wrap.appendChild(outer);
  });
}

function buildClienteRow(rutaKey, cliKey, cli){
  var ef=cli.efectivo||0, tr=cli.transferencia||0, tot=cli.importe||0;
  var pagado=ef+tr, saldo=tot-pagado;
  var modo=cli.modo||"ninguno";
  var isCO=clienteAbierto[rutaKey]===cliKey;
  var sc=saldo<=0?"ok":saldo<tot?"warn":"neg";

  var row=document.createElement("div");
  row.className="ruta-cli-row";

  // Head
  var head=document.createElement("div");
  head.className="ruta-cli-head";
  head.innerHTML=
    '<div style="flex:1;min-width:0"><div class="ruta-cli-nom">'+cli.nom+'</div><div style="font-size:12px;color:var(--muted);margin-top:1px">$'+fM(tot)+'</div></div>'+
    (saldo<=0?'<span class="chip chip-ok">✓ Pagado</span>':pagado>0?'<span class="chip chip-warn">$'+fM(saldo)+' rest.</span>':'<span class="chip chip-red">Sin pago</span>')+
    '<span style="color:var(--muted2);font-size:14px;margin-left:8px">'+(isCO?"▲":"▼")+'</span>';
  head.onclick=function(){toggleCliente(rutaKey,cliKey);};
  row.appendChild(head);

  // Body
  var body=document.createElement("div");
  body.className="ruta-cli-body"+(isCO?" open":"");

  // Items list
  var items=cli.items||[];
  if(items.length){
    var itemsDiv=document.createElement("div");
    itemsDiv.style.cssText="padding:4px 0 8px";
    items.forEach(function(it){
      var d=document.createElement("div");
      d.className="ruta-item";
      d.innerHTML='<span class="ruta-item-name">'+it.n+'</span><span class="ruta-item-cant">'+it.c+'×</span><span class="ruta-item-sub">$'+fM(it.sub)+'</span>';
      itemsDiv.appendChild(d);
    });
    body.appendChild(itemsDiv);
  }

  // Pago section
  var pagoDiv=document.createElement("div");
  pagoDiv.className="pago-section";

  var pagoTitle=document.createElement("div");
  pagoTitle.className="pago-section-title";
  pagoTitle.textContent="Registrar cobro";
  pagoDiv.appendChild(pagoTitle);

  // Modo buttons
  var modoRow=document.createElement("div");
  modoRow.className="pago-modo-row";
  ["efectivo","transferencia","mixto"].forEach(function(m){
    var mb=document.createElement("button");
    mb.className="modo-btn"+(modo===m?" sel":"");
    mb.textContent=m==="efectivo"?"💵 Efectivo":m==="transferencia"?"📲 Transfer.":"🔀 Mixto";
    mb.onclick=function(){setModo(rutaKey,cliKey,m);};
    modoRow.appendChild(mb);
  });
  pagoDiv.appendChild(modoRow);

  // Inputs
  var inputsDiv=document.createElement("div");
  if(modo==="ninguno"){
    inputsDiv.innerHTML='<div style="font-size:13px;color:var(--muted);text-align:center;padding:8px 0">Elegí un método de cobro</div>';
  } else {
    inputsDiv.className="pago-inputs";
    if(modo==="efectivo"||modo==="mixto"){
      var fef=document.createElement("div"); fef.className="pago-field";
      fef.innerHTML='<label>Efectivo</label><input type="number" id="ef-'+rutaKey+'-'+cliKey+'" value="'+(ef||"")+'">';
      inputsDiv.appendChild(fef);
    }
    if(modo==="transferencia"||modo==="mixto"){
      var ftr=document.createElement("div"); ftr.className="pago-field";
      ftr.innerHTML='<label>Transferencia</label><input type="number" id="tr-'+rutaKey+'-'+cliKey+'" value="'+(tr||"")+'">';
      inputsDiv.appendChild(ftr);
    }
  }
  pagoDiv.appendChild(inputsDiv);

  // Saldo
  var saldoRow=document.createElement("div");
  saldoRow.className="pago-saldo-row";
  saldoRow.innerHTML='<span class="pago-saldo-lbl">Saldo</span><span class="pago-saldo-val '+sc+'">$'+fM(saldo)+'</span>';
  pagoDiv.appendChild(saldoRow);

  // Guardar cobro
  if(modo!=="ninguno"){
    var saveBtn=document.createElement("button");
    saveBtn.className="save-pago-btn";
    saveBtn.textContent="💾 Guardar cobro";
    saveBtn.onclick=function(){guardarPago(rutaKey,cliKey);};
    pagoDiv.appendChild(saveBtn);
  }

  body.appendChild(pagoDiv);

  // Acciones cliente
  var cliAct=document.createElement("div");
  cliAct.className="cli-action-row";

  var btnMover=document.createElement("button");
  btnMover.className="btn-mover";
  btnMover.textContent="🔀 Mover a otra ruta";
  btnMover.onclick=function(){abrirMover(rutaKey,cliKey);};

  var btnQuitar=document.createElement("button");
  btnQuitar.className="btn-quitar";
  btnQuitar.textContent="🗑 Quitar de la ruta";
  btnQuitar.onclick=function(){borrarClienteRuta(rutaKey,cliKey,cli.nom);};

  cliAct.appendChild(btnMover);
  cliAct.appendChild(btnQuitar);
  body.appendChild(cliAct);

  row.appendChild(body);
  return row;
}

function toggleRuta(k){ rutaAbierta=rutaAbierta===k?null:k; renderRutas(); }
function toggleCliente(rk,ck){ if(clienteAbierto[rk]===ck)delete clienteAbierto[rk]; else clienteAbierto[rk]=ck; renderRutas(); }
function setModo(rk,ck,modo){ if(!rutasData[rk]||!rutasData[rk].clientes||!rutasData[rk].clientes[ck])return; rutasData[rk].clientes[ck].modo=modo; if(modo==="efectivo")rutasData[rk].clientes[ck].transferencia=0; if(modo==="transferencia")rutasData[rk].clientes[ck].efectivo=0; clienteAbierto[rk]=ck; renderRutas(); }
function guardarPago(rk,ck){ if(!rutasData[rk]||!rutasData[rk].clientes||!rutasData[rk].clientes[ck])return; var cli=rutasData[rk].clientes[ck],modo=cli.modo||"ninguno"; var efEl=document.getElementById("ef-"+rk+"-"+ck),trEl=document.getElementById("tr-"+rk+"-"+ck); var ef=efEl?+efEl.value||0:0,tr=trEl?+trEl.value||0:0; cli.efectivo=ef;cli.transferencia=tr;clienteAbierto[rk]=ck; fbPatch("empresas/"+empresaKey+"/rutas/"+rk+"/clientes/"+ck,{efectivo:ef,transferencia:tr,modo:modo}).then(function(){renderRutas();}).catch(function(){alert("Error al guardar.");}); }

// RENOMBRAR
function abrirRenombrar(rk){ modalRutaKey=rk; document.getElementById("modal-ruta-nombre").value=rutasData[rk]?rutasData[rk].nombre||"":""; abrirModal("modal-renombrar"); setTimeout(function(){document.getElementById("modal-ruta-nombre").focus();},100); }
function confirmarRenombrar(){ var nombre=document.getElementById("modal-ruta-nombre").value.trim(); if(!nombre||!modalRutaKey)return; fbPatch("empresas/"+empresaKey+"/rutas/"+modalRutaKey,{nombre:nombre}).then(function(){if(rutasData[modalRutaKey])rutasData[modalRutaKey].nombre=nombre;cerrarModal("modal-renombrar");renderRutas();}).catch(function(){alert("Error al renombrar.");}); }

// BORRAR CLIENTE
function borrarClienteRuta(rk,ck,nom){ if(!confirm("¿Quitar a "+(nom||"este cliente")+" de la ruta?"))return; fbDel("empresas/"+empresaKey+"/rutas/"+rk+"/clientes/"+ck).then(function(){if(rutasData[rk]&&rutasData[rk].clientes)delete rutasData[rk].clientes[ck];if(clienteAbierto[rk]===ck)delete clienteAbierto[rk];renderRutas();}).catch(function(){alert("Error al borrar.");}); }

// MOVER CLIENTE
function abrirMover(rk,ck){ var keys=Object.keys(rutasData).filter(function(k){return k!==rk;}); if(!keys.length){alert("No hay otras rutas. Creá una nueva primero.");return;} modalRutaKey=rk; modalCliKey=ck; var sel=document.getElementById("modal-mover-destino"); sel.innerHTML=keys.map(function(k){return'<option value="'+k+'">'+(rutasData[k].nombre||new Date(rutasData[k].fecha||"").toLocaleDateString("es-AR"))+'</option>';}).join(""); abrirModal("modal-mover"); }
function confirmarMover(){ if(!modalRutaKey||!modalCliKey)return; var dst=document.getElementById("modal-mover-destino").value; var cli=rutasData[modalRutaKey]&&rutasData[modalRutaKey].clientes?rutasData[modalRutaKey].clientes[modalCliKey]:null; if(!cli){cerrarModal("modal-mover");return;} var rk=modalRutaKey,ck=modalCliKey; fbPush("empresas/"+empresaKey+"/rutas/"+dst+"/clientes",cli).then(function(nk){if(!rutasData[dst])rutasData[dst]={clientes:{}};if(!rutasData[dst].clientes)rutasData[dst].clientes={};rutasData[dst].clientes[nk]=cli;return fbDel("empresas/"+empresaKey+"/rutas/"+rk+"/clientes/"+ck);}).then(function(){if(rutasData[rk]&&rutasData[rk].clientes)delete rutasData[rk].clientes[ck];if(clienteAbierto[rk]===ck)delete clienteAbierto[rk];cerrarModal("modal-mover");rutaAbierta=dst;renderRutas();}).catch(function(){alert("Error al mover.");}); }

// PDF RUTA
function descargarPDFRuta(rk){ var ruta=rutasData[rk];if(!ruta)return; var jsPDF=window.jspdf.jsPDF,doc=new jsPDF(); if(empresaData.logo)doc.addImage(empresaData.logo,"PNG",10,5,40,20); doc.setFont("helvetica","bold");doc.text("HOJA DE RUTA — "+(ruta.nombre||"Ruta").toUpperCase(),105,16,{align:"center"}); doc.setFont("helvetica","normal");doc.setFontSize(10);doc.text("Fecha: "+new Date(ruta.fecha).toLocaleDateString(),14,26); var calc=calcRuta(ruta); doc.autoTable({startY:32,head:[["Cliente","Total","Efectivo","Transfer.","Saldo"]],body:Object.values(ruta.clientes||{}).map(function(c){return[c.nom,"$"+fM(c.importe||0),"$"+fM(c.efectivo||0),"$"+fM(c.transferencia||0),"$"+fM((c.importe||0)-(c.efectivo||0)-(c.transferencia||0))];}),foot:[["","$"+fM(calc.total),"","","$"+fM(calc.saldo)]],theme:"striped",headStyles:{fillColor:[13,27,42]}}); doc.save("Ruta_"+(ruta.nombre||"ruta")+".pdf"); }

// VENTAS
function cargarVentasFirebase(f){ setStatus("fb-res-status","sync","☁️"); fbGet("empresas/"+empresaKey+"/ventas").then(function(d){ventas=d?Object.entries(d).map(function(e){return Object.assign({},e[1],{fbKey:e[0]});}):[];setStatus("fb-res-status","ok","✅");poblarFiltros();renderResumen();}).catch(function(){setStatus("fb-res-status","err","❌");}); }
function borrarVenta(fbKey){ if(!confirm("¿Borrar este remito del resumen?"))return; fbDel("empresas/"+empresaKey+"/ventas/"+fbKey).then(function(){ventas=ventas.filter(function(v){return v.fbKey!==fbKey;});renderResumen();}).catch(function(){alert("Error al borrar.");}); }
function poblarFiltros(){ var now=new Date(),selA=document.getElementById("fil-anio"),anioAct=+selA.value||now.getFullYear(); var anioSet=new Set([now.getFullYear()]);ventas.forEach(function(v){anioSet.add(v.anio);}); selA.innerHTML=Array.from(anioSet).sort(function(a,b){return b-a;}).map(function(a){return'<option value="'+a+'"'+(a===anioAct?" selected":"")+'>'+a+'</option>';}).join(""); poblarMeses(); }
function poblarMeses(){ var now=new Date(),anio=+document.getElementById("fil-anio").value||now.getFullYear(),selM=document.getElementById("fil-mes"),mesAct=selM.value!==""?+selM.value:now.getMonth(); var cd=new Set();ventas.filter(function(v){return v.anio===anio;}).forEach(function(v){cd.add(v.mes);});cd.add(now.getMonth()); selM.innerHTML=MESES.map(function(m,i){return'<option value="'+i+'"'+(i===mesAct?" selected":"")+'>'+m+(cd.has(i)?" ●":"")+'</option>';}).join(""); }

function renderResumen(){
  var mes=+document.getElementById("fil-mes").value,anio=+document.getElementById("fil-anio").value||new Date().getFullYear();
  var data=ventas.filter(function(v){return v.mes===mes&&v.anio===anio;});
  var body=document.getElementById("resumen-body");
  if(!data.length){body.innerHTML='<div class="empty-res"><div style="font-size:44px">📭</div><b>Sin datos para '+MESES[mes]+' '+anio+'</b></div>';return;}
  var total=data.reduce(function(s,v){return s+v.total;},0),cant=data.length,prom=total/cant;
  var comCli=empresaData.comClientes||16.65,comPat=empresaData.comPatagonia||20;
  var tCli=0,tPat=0;data.forEach(function(v){if((v.lista||"").toLowerCase().includes("patagonia"))tPat+=v.total;else tCli+=v.total;});
  var comTot=tCli*comCli/100+tPat*comPat/100;
  var porCli={};data.forEach(function(v){porCli[v.clienteNom]=(porCli[v.clienteNom]||0)+v.total;});
  var cliRank=Object.entries(porCli).sort(function(a,b){return b[1]-a[1];});
  var porProd={};data.forEach(function(v){(v.items||[]).forEach(function(it){if(!porProd[it.n])porProd[it.n]={n:it.n,id:it.id,cant:0,total:0};porProd[it.n].cant+=it.c;porProd[it.n].total+=it.sub;});});
  var prodRank=Object.values(porProd).sort(function(a,b){return b.total-a.total;}).slice(0,10);
  var maxC=cliRank[0]?cliRank[0][1]:1,maxP=prodRank[0]?prodRank[0].total:1;
  var comBreak=[];if(tCli>0)comBreak.push({label:"Lista Clientes ("+comCli+"%)",venta:tCli,com:tCli*comCli/100});if(tPat>0)comBreak.push({label:"Lista Patagonia ("+comPat+"%)",venta:tPat,com:tPat*comPat/100});
  body.innerHTML=
    '<div class="kpi-grid">'+
      '<div class="kpi full"><div class="kpi-icon">💰</div><div class="kpi-val">$'+fM(total)+'</div><div class="kpi-lbl">Total vendido · '+MESES[mes]+' '+anio+'</div></div>'+
      '<div class="kpi"><div class="kpi-icon">🧾</div><div class="kpi-val">'+cant+'</div><div class="kpi-lbl">Remitos</div></div>'+
      '<div class="kpi"><div class="kpi-icon">📈</div><div class="kpi-val">$'+fM(prom)+'</div><div class="kpi-lbl">Ticket prom.</div></div>'+
      (cliRank[0]?'<div class="kpi full"><div class="kpi-icon">🏆</div><div class="kpi-val" style="font-size:16px">'+cliRank[0][0]+'</div><div class="kpi-lbl">Cliente del mes</div><div class="kpi-sub">$'+fM(cliRank[0][1])+'</div></div>':"")+
    '</div>'+
    '<div class="sec-card" style="border-color:#a7f3d0">'+
      '<div class="sec-head" style="background:#ecfdf5;color:#065f46;border-bottom-color:#a7f3d0">💵 Comisión estimada · '+MESES[mes]+' '+anio+'</div>'+
      '<div style="padding:14px">'+
        comBreak.map(function(b){return'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:600">'+b.label+'</div><div style="font-size:11px;color:var(--muted);margin-top:1px">Sobre $'+fM(b.venta)+'</div></div><div style="font-size:16px;font-weight:700;color:var(--green)">$'+fM(b.com)+'</div></div>';}).join("")+
        '<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:700">Total comisión</div><div style="font-size:11px;color:var(--muted)">'+(comTot/total*100).toFixed(1)+'% del total</div></div><div style="font-size:22px;font-weight:800;color:var(--green)">$'+fM(comTot)+'</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="sec-card"><div class="sec-head">👥 Clientes por volumen</div>'+cliRank.slice(0,8).map(function(c,i){return'<div class="rank-item"><span class="rank-n '+(MED[i]||"")+'">'+( i+1)+'</span><div style="flex:1;min-width:0"><div class="rank-name">'+c[0]+'</div><div class="rank-bar-bg"><div class="rank-bar" style="width:'+Math.round(c[1]/maxC*100)+'%"></div></div></div><span class="rank-val">$'+fM(c[1])+'</span></div>';}).join("")+'</div>'+
    '<div class="sec-card"><div class="sec-head">📦 Productos más vendidos</div>'+prodRank.map(function(p,i){return'<div class="rank-item"><span class="rank-n '+(MED[i]||"")+'">'+( i+1)+'</span><div style="flex:1;min-width:0"><div class="rank-name">'+p.n+'</div><div style="font-size:11px;color:var(--muted);margin-top:1px">'+p.cant+' unidades</div><div class="rank-bar-bg"><div class="rank-bar" style="width:'+Math.round(p.total/maxP*100)+'%"></div></div></div><span class="rank-val">$'+fM(p.total)+'</span></div>';}).join("")+'</div>'+
    '<div class="sec-card"><div class="sec-head">📅 Detalle de remitos</div>'+(function(){var r="";data.slice().reverse().forEach(function(v){r+='<div class="detail-row"><span class="detail-date">'+new Date(v.fecha).toLocaleDateString()+'</span><span class="detail-cli">'+v.clienteNom+'</span><span class="detail-tot">$'+fM(v.total)+'</span><button class="del-btn" data-k="'+v.fbKey+'" onclick="borrarVenta(this.dataset.k)">✕</button></div>';});return r;})()+'</div>';
}

// Modales: cerrar al click en fondo
document.addEventListener("click",function(e){
  if(e.target.classList.contains("modal-bg"))e.target.classList.remove("open");
  if(!e.target.closest(".search-wrap"))document.querySelectorAll(".dropdown").forEach(function(d){d.classList.remove("open");});
});
document.getElementById("modal-ruta-nombre").addEventListener("keydown",function(e){if(e.key==="Enter")confirmarRenombrar();});
</script>
</body>
</html>
